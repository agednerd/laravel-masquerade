name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        dependencies: [lowest, stable]
    name: Verify PHP ${{ matrix.php }} / ${{ matrix.dependencies }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite
          coverage: none
      - name: Validate Composer metadata
        run: composer validate --strict
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress ${{ matrix.dependencies == 'lowest' && '--prefer-lowest' || '' }}
      - name: Run tests
        run: vendor/bin/phpunit

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify release changelog
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! grep -Eq "^## ${version} - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md; then
            echo "CHANGELOG.md must contain: ## ${version} - YYYY-MM-DD"
            exit 1
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --verify-tag
          --generate-notes
          --fail-on-no-commits
          --title "${GITHUB_REF_NAME}"
